name: Daily Snapshot

on:
  schedule:
    # A股 15:37 CST = 07:37 UTC, 周一至周五 (收盘后约 37 分钟, 错开整点高峰)
    - cron: "37 7 * * 1-5"
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Restore state.json from cache
        uses: actions/cache@v4
        with:
          path: state.json
          key: stock-agent-state-${{ github.run_id }}
          restore-keys: |
            stock-agent-state-
      - run: pip install -r requirements.txt
      - name: Run daily snapshot
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          FEISHU_WEBHOOK_URL_ASTOCK: ${{ secrets.FEISHU_WEBHOOK_URL_ASTOCK }}
          TZ: Asia/Shanghai
          DATA_SOURCE: akshare
        run: python -m src.jobs snapshot
