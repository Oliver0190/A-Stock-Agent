name: Intraday Alert

on:
  schedule:
    # 港股交易时段 每10分钟一次, 错开整点高峰 (UTC 分钟用 3/13/23/33/43/53)
    - cron: "3,13,23,33,43,53 1-3 * * 1-5"   # 09:33 - 11:53 HKT
    - cron: "3 4 * * 1-5"                     # 12:03 HKT (午休前最后一查)
    - cron: "3,13,23,33,43,53 5-7 * * 1-5"   # 13:03 - 15:53 HKT
    - cron: "3 8 * * 1-5"                     # 16:03 HKT (收盘最后一查)
  workflow_dispatch:

jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Restore state.json from cache
        uses: actions/cache@v4
        with:
          path: state.json
          key: stock-agent-state-${{ github.run_id }}
          restore-keys: |
            stock-agent-state-
      - run: pip install -r requirements.txt
      - name: Run intraday alert
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          TZ: Asia/Hong_Kong
          DATA_SOURCE: akshare
        run: python -m src.jobs intraday
