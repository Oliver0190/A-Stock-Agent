name: Intraday Alert

on:
  schedule:
    # A股交易时段 每10分钟一次, 错开整点高峰 (UTC 分钟用 3/13/23/33/43/53)
    # 上午盘 9:30-11:30 CST
    - cron: "33,43,53 1 * * 1-5"            # 09:33-09:53 CST
    - cron: "3,13,23,33,43,53 2 * * 1-5"    # 10:03-10:53 CST
    - cron: "3,13,23 3 * * 1-5"             # 11:03-11:23 CST
    # 下午盘 13:00-15:00 CST
    - cron: "3,13,23,33,43,53 5-6 * * 1-5"  # 13:03-14:53 CST
    - cron: "3 7 * * 1-5"                   # 15:03 CST (收盘最后一查)
  workflow_dispatch:

jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Restore state.json from cache
        uses: actions/cache@v4
        with:
          path: state.json
          key: stock-agent-state-${{ github.run_id }}
          restore-keys: |
            stock-agent-state-
      - run: pip install -r requirements.txt
      - name: Run intraday alert
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          FEISHU_WEBHOOK_URL_ASTOCK: ${{ secrets.FEISHU_WEBHOOK_URL_ASTOCK }}
          TZ: Asia/Shanghai
          DATA_SOURCE: akshare
        run: python -m src.jobs intraday
